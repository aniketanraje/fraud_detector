training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  scoring: "average_precision"


xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  scale_pos_weight: 577
  eval_metric: "aucpr"
  use_label_encoder: false
  random_state: 42
  n_jobs: -1

logistic_regression:
  C: 1.0
  class_weight: "balanced"
  max_tier: 1000
  solver: "lbfgs"
  random_state: 42

random_forest:
  n_estimators: 100
  max_depth: 10
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1

resampling:
  strategy: "smote"
  sampling_strategy: "auto"
  random_strategy: 42

thresholds:
  fraud_probability: 0.5
  high_risk_alert: 0.8